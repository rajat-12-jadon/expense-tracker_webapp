<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="light-mode">
    <div class="container">
        <!-- Header & Theme Toggle -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-wallet"></i>
                <h1>Expense Tracker</h1>
            </div>
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- Dashboard Widgets -->
        <section class="dashboard">
            <div class="card balance-card">
                <h2>Total Balance</h2>
                <h3 id="balance">$0.00</h3>
            </div>

            <div class="summary-cards">
                <div class="card income-card">
                    <div class="card-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
                    <div class="card-details">
                        <h4>Income</h4>
                        <p id="total-income">+$0.00</p>
                    </div>
                </div>
                <div class="card expense-card">
                    <div class="card-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
                    <div class="card-details">
                        <h4>Expense</h4>
                        <p id="total-expense">-$0.00</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Content Area: Chart and Transactions -->
        <div class="main-content">
            <!-- Left Column: Add Transaction & Chart -->
            <div class="left-col">
                <section class="card add-transaction">
                    <h3>Add New Transaction</h3>
                    <form id="transaction-form">
                        <div class="form-group">
                            <label for="text">Description</label>
                            <input type="text" id="text" placeholder="e.g. Groceries" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount <small>(- for expense, + for income)</small></label>
                            <input type="number" id="amount" placeholder="e.g. -50 or 1000" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="Food">Food</option>
                                <option value="Transport">Transport</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Bills">Bills</option>
                                <option value="Salary">Salary</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <button class="btn-primary" type="submit">Add Transaction <i
                                class="fa-solid fa-plus"></i></button>
                    </form>
                </section>

                <section class="card chart-container">
                    <h3>Expenses by Category</h3>
                    <div>
                        <canvas id="expenseChart"></canvas>
                    </div>
                </section>
            </div>

            <!-- Right Column: Transaction History -->
            <div class="right-col">
                <section class="card history">
                    <div class="history-header">
                        <h3>Recent Transactions</h3>
                        <span id="transaction-count">0 items</span>
                    </div>
                    <ul id="transaction-list" class="list">
                        <!-- Transactions will be rendered here dynamically -->
                    </ul>
                </section>
            </div>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
